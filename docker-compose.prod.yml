services:
  db:
    image: postgres:16-alpine
    container_name: tradingon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradingon}
      POSTGRES_USER: ${POSTGRES_USER:-tradingon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradingon} -d ${POSTGRES_DB:-tradingon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradingon-app:latest
    container_name: tradingon-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradingon}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tradingon}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/api/health/live').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"

volumes:
  pgdata:
