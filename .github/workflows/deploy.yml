name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build application
        run: npm run build:all

      - name: Run tests
        run: npm test -- --runInBand

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure application directory exists
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$APP_DIR'"

      - name: Sync application files
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -az --delete \
            --exclude ".env" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "frontend/node_modules" \
            --exclude "dist" \
            --exclude "frontend/dist" \
            --exclude "public" \
            -e "ssh -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:$APP_DIR/"

      - name: Run remote deployment
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "chmod +x '$APP_DIR/scripts/deploy-prod.sh' && APP_DIR='$APP_DIR' '$APP_DIR/scripts/deploy-prod.sh'"
